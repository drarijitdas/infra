name: "AWS Deploy Setup"
description: "Configure AWS credentials, Terraform, and environment for deployment"
inputs:
  environment:
    description: "Target environment for deployment, e.g. staging"
    required: true
  aws_region:
    description: "AWS region"
    required: true
  aws_role_arn:
    description: "IAM role ARN to assume via OIDC"
    required: true
  terraform_state_bucket:
    description: "S3 bucket for Terraform state"
    required: true

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}

    - name: Load environment file
      run: |
        echo "${{ inputs.environment }}" > .last_used_env
        if [ -f ".env.${{ inputs.environment }}" ]; then
          set -a
          . .env.${{ inputs.environment }}
          set +a
        fi
        echo "AWS_REGION=${{ inputs.aws_region }}" >> $GITHUB_ENV
      shell: bash

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.7

    - name: Cache Terraform providers
      uses: actions/cache@v4
      with:
        path: ~/.terraform.d/plugin-cache
        key: terraform-providers-aws-${{ hashFiles('iac/provider-aws/.terraform.lock.hcl') }}
        restore-keys: |
          terraform-providers-aws-

    - name: Terraform init
      working-directory: iac/provider-aws
      run: |
        mkdir -p ~/.terraform.d/plugin-cache
        export TF_PLUGIN_CACHE_DIR=~/.terraform.d/plugin-cache
        terraform init -input=false -reconfigure \
          -backend-config="bucket=${{ inputs.terraform_state_bucket }}" \
          -backend-config="region=${{ inputs.aws_region }}"
      shell: bash
