name: "AWS: Deploy Infrastructure"

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Specific commit SHA to checkout"
        required: true
        type: string
      environment:
        description: "Target environment (staging, prod)"
        required: true
        type: string
      plan_only:
        description: "Only plan without applying"
        required: false
        type: string
        default: "false"

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    # Disabled until deployment is ready — remove this line to enable
    if: false
    name: Deploy infra to ${{ inputs.environment }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Setup AWS environment
        uses: ./.github/actions/aws-deploy-setup
        with:
          environment: ${{ inputs.environment }}
          aws_region: ${{ secrets.AWS_REGION }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          terraform_state_bucket: ${{ secrets.TERRAFORM_STATE_BUCKET }}

      - name: Apply init module
        if: inputs.plan_only == 'false'
        working-directory: iac/provider-aws
        run: make apply-init

      - name: Plan infrastructure
        working-directory: iac/provider-aws
        run: make plan-without-jobs

      - name: Apply infrastructure
        if: inputs.plan_only == 'false'
        working-directory: iac/provider-aws
        env:
          AUTO_CONFIRM_DEPLOY: "true"
        run: make apply
