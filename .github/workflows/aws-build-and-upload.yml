name: "AWS: Build and Upload"

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Specific commit SHA to checkout"
        required: true
        type: string
      environment:
        description: "Target environment (staging, prod)"
        required: true
        type: string
      job_names:
        description: "Jobs to build, e.g. api;orchestrator;client-proxy"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    # Disabled until deployment is ready — remove this line to enable
    if: false
    name: Build and upload to ${{ inputs.environment }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Setup AWS environment
        uses: ./.github/actions/aws-deploy-setup
        with:
          environment: ${{ inputs.environment }}
          aws_region: ${{ secrets.AWS_REGION }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          terraform_state_bucket: ${{ secrets.TERRAFORM_STATE_BUCKET }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin \
              "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      - name: Build and upload jobs
        env:
          AUTO_CONFIRM_DEPLOY: "true"
        working-directory: iac/provider-aws
        run: |
          IFS=';' read -ra JOBS <<< "${{ inputs.job_names }}"
          for job_name in "${JOBS[@]}"; do
            job_name=$(echo "$job_name" | xargs)
            if [ -n "$job_name" ]; then
              echo "::group::Building and uploading: $job_name"
              make build-and-upload/$job_name
              echo "::endgroup::"
            fi
          done
