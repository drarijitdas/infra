name: "AWS: Deploy Job"

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Specific commit SHA to checkout"
        required: true
        type: string
      environment:
        description: "Target environment (staging, prod)"
        required: true
        type: string
      job_names:
        description: "Jobs to deploy, e.g. api;orchestrator, separated by ;"
        required: true
        type: string
      plan_only:
        description: "Only plan without applying"
        required: false
        type: string
        default: "false"

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    # Disabled until deployment is ready — remove this line to enable
    if: false
    name: Deploy jobs to ${{ inputs.environment }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Setup AWS environment
        uses: ./.github/actions/aws-deploy-setup
        with:
          environment: ${{ inputs.environment }}
          aws_region: ${{ secrets.AWS_REGION }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          terraform_state_bucket: ${{ secrets.TERRAFORM_STATE_BUCKET }}

      - name: Deploy jobs
        working-directory: iac/provider-aws
        env:
          AUTO_CONFIRM_DEPLOY: "true"
          SKIP_FMT: "true"
        run: |
          IFS=';' read -ra JOBS <<< "${{ inputs.job_names }}"
          for job_name in "${JOBS[@]}"; do
            job_name=$(echo "$job_name" | xargs)
            if [ -n "$job_name" ]; then
              echo "::group::Deploying: $job_name"
              make plan-only-jobs/$job_name
              if [ "${{ inputs.plan_only }}" == "false" ]; then
                make apply
              else
                echo "Skipping apply — plan_only is true"
              fi
              echo "::endgroup::"
            fi
          done
